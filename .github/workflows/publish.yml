name: Publish npm package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Keep the standard CI hooks from the agreed plan.
      # This repo currently has no build/test scripts, so these no-op safely.
      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Read package metadata
        id: pkg
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const pkg = require('./package.json');
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE

      # Skip gracefully when the exact version was already published.
      - name: Check npm for existing version
        id: npmcheck
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm token auth fallback
        if: steps.npmcheck.outputs.exists == 'false' && env.NPM_TOKEN != ''
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$RUNNER_TEMP/.npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc" >> "$GITHUB_ENV"

      - name: Describe publish auth mode
        if: steps.npmcheck.outputs.exists == 'false'
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "Using NPM_TOKEN-based npm publish authentication."
            echo "If publish returns EOTP, replace NPM_TOKEN with an automation/granular publish token that can bypass 2FA."
          else
            echo "No NPM_TOKEN secret configured; relying on npm trusted publishing via GitHub OIDC."
            echo "If publish returns ENEEDAUTH, configure npm Trusted Publisher for this repo/workflow or add NPM_TOKEN."
          fi

      # npm publish will also run this repo's prepack verification chain.
      # publishConfig.tag=beta from package.json remains in effect.
      - name: Publish to npm
        if: steps.npmcheck.outputs.exists == 'false'
        run: npm publish --access public --provenance
