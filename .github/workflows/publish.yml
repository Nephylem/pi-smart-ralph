name: Publish npm package

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.pkg.outputs.changed }}
      name: ${{ steps.pkg.outputs.name }}
      version: ${{ steps.pkg.outputs.version }}
      tag: ${{ steps.pkg.outputs.tag }}
      npm_tag: ${{ steps.pkg.outputs.npm_tag }}
      previous_version: ${{ steps.pkg.outputs.previous_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package version change
        id: pkg
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require('node:child_process');
          const { readFileSync } = require('node:fs');

          const current = JSON.parse(readFileSync('package.json', 'utf8'));
          const before = process.env.BEFORE_SHA || '';
          const zeroSha = /^0+$/.test(before);
          let previousVersion = '';

          if (before && !zeroSha) {
            try {
              const previousPackage = execFileSync('git', ['show', `${before}:package.json`], { encoding: 'utf8' });
              previousVersion = JSON.parse(previousPackage).version || '';
            } catch (error) {
              previousVersion = '';
            }
          }

          const changed = previousVersion !== current.version;
          console.log(`name=${current.name}`);
          console.log(`version=${current.version}`);
          console.log(`tag=v${current.version}`);
          console.log(`npm_tag=${current.publishConfig?.tag || 'latest'}`);
          console.log(`previous_version=${previousVersion}`);
          console.log(`changed=${changed}`);
          NODE

      - name: Report unchanged package version
        if: steps.pkg.outputs.changed != 'true'
        run: |
          echo "package.json changed, but package version did not change (${{ steps.pkg.outputs.version }}); skipping npm publish CD."

  publish:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_AUTH_MODE: ${{ vars.NPM_PUBLISH_AUTH_MODE || 'trusted' }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_DIST_TAG: ${{ needs.detect-version-change.outputs.npm_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Typecheck package sources
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Run index and acceptance parity verifiers
        run: npm run verify:index

      - name: Run package cleanup and dry-run verifiers
        run: npm run verify:pack

      - name: Verify publish bundle metadata
        run: node scripts/verify-publish-bundle.mjs

      # Skip gracefully when the exact version was already published.
      - name: Check npm for existing version
        id: npmcheck
        run: |
          if npm view "${{ needs.detect-version-change.outputs.name }}@${{ needs.detect-version-change.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate publish auth mode
        if: steps.npmcheck.outputs.exists == 'false' || needs.detect-version-change.outputs.npm_tag == 'latest'
        run: |
          case "$NPM_PUBLISH_AUTH_MODE" in
            trusted|token) ;;
            *)
              echo "Unsupported NPM_PUBLISH_AUTH_MODE: $NPM_PUBLISH_AUTH_MODE"
              echo "Use 'trusted' (default) or 'token'."
              exit 1
              ;;
          esac

      - name: Configure npm token auth
        if: (steps.npmcheck.outputs.exists == 'false' || needs.detect-version-change.outputs.npm_tag == 'latest') && env.NPM_PUBLISH_AUTH_MODE == 'token'
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_PUBLISH_AUTH_MODE=token requires the NPM_TOKEN secret."
            exit 1
          fi
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$RUNNER_TEMP/.npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc" >> "$GITHUB_ENV"

      - name: Describe publish auth mode
        if: steps.npmcheck.outputs.exists == 'false' || needs.detect-version-change.outputs.npm_tag == 'latest'
        run: |
          if [ "$NPM_PUBLISH_AUTH_MODE" = "token" ]; then
            echo "Using token-based npm publish authentication."
            echo "NPM_TOKEN must be an automation/granular publish token that can bypass 2FA, or npm will return EOTP."
          else
            echo "Using npm trusted publishing via GitHub OIDC."
            echo "If publish returns ENEEDAUTH, configure npm Trusted Publisher for this repo/workflow or switch NPM_PUBLISH_AUTH_MODE to token with a valid publish token."
          fi

      # npm publish will also run this repo's prepack verification chain.
      # package.json publishConfig.tag controls the npm dist-tag; default is latest.
      - name: Publish to npm
        if: steps.npmcheck.outputs.exists == 'false'
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"

      - name: Ensure npm latest dist-tag
        if: needs.detect-version-change.outputs.npm_tag == 'latest'
        env:
          PACKAGE_NAME: ${{ needs.detect-version-change.outputs.name }}
          PACKAGE_VERSION: ${{ needs.detect-version-change.outputs.version }}
        run: |
          set -euo pipefail
          current_latest=""
          for attempt in 1 2 3 4 5 6; do
            current_latest="$(npm view "${PACKAGE_NAME}" dist-tags.latest 2>/dev/null || true)"
            if [ "${current_latest}" = "${PACKAGE_VERSION}" ]; then
              echo "npm latest already points to ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              exit 0
            fi
            echo "npm latest is '${current_latest:-<unset>}' (attempt ${attempt}/6); waiting for registry consistency before updating."
            sleep 10
          done

          echo "Updating npm latest dist-tag from '${current_latest:-<unset>}' to ${PACKAGE_NAME}@${PACKAGE_VERSION}."
          if ! npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" latest; then
            echo "Failed to update npm latest dist-tag. If using trusted publishing, npm may still require token auth for dist-tag mutation."
            echo "Set NPM_PUBLISH_AUTH_MODE=token with an NPM_TOKEN that can manage dist-tags, then rerun."
            exit 1
          fi

      - name: Ensure matching GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.detect-version-change.outputs.name }}
          PACKAGE_VERSION: ${{ needs.detect-version-change.outputs.version }}
          RELEASE_TAG: ${{ needs.detect-version-change.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${RELEASE_TAG} already exists at ${tag_commit}, not current commit ${GITHUB_SHA}."
              echo "Refusing to create a mismatched GitHub release. Bump package.json version or fix the existing tag manually."
              exit 1
            fi
            echo "Tag ${RELEASE_TAG} already exists at the current commit."
          else
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "npm: https://www.npmjs.com/package/${PACKAGE_NAME}/v/${PACKAGE_VERSION}"
          fi
