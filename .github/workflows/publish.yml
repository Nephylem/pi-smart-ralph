name: Publish npm package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Keep the standard CI hooks from the agreed plan.
      # This repo currently has no build/test scripts, so these no-op safely.
      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      # Skip gracefully when the exact version was already published.
      - name: Check npm for existing version
        id: npmcheck
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # npm publish will also run this repo's prepack verification chain.
      # publishConfig.tag=beta from package.json remains in effect.
      - name: Publish to npm
        if: steps.npmcheck.outputs.exists == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
