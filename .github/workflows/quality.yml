name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'references/**'
      - 'templates/**'
      - 'skills/**'
      - 'agents/**'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck package sources
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Run index and acceptance parity verifiers
        run: npm run verify:index

      - name: Run package cleanup and dry-run verifiers
        run: npm run verify:pack

      - name: Verify publish bundle metadata
        run: node scripts/verify-publish-bundle.mjs
